services:
  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: rag_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2}
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Pulling Ollama models via $$OLLAMA_HOST ..."
        ollama pull "$$OLLAMA_EMBED_MODEL"
        ollama pull "$$OLLAMA_CHAT_MODEL"
        echo "Models ready:"
        ollama list

  mcp-server:
    build: .
    container_name: rag_mcp
    command: python -m mcp_server.server
    ports:
      - "8010:8010"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2}
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8010
      DOCS_DIR: /docs
      CHROMA_DIR: /app/data/chroma
      UPLOADS_DIR: /app/uploads
    volumes:
      - ../docs:/docs:ro
      - ./data/chroma:/app/data/chroma
      - ./uploads:/app/uploads
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped

  ui:
    build: .
    container_name: rag_ui
    command: >
      streamlit run ui/app.py
      --server.address=0.0.0.0
      --server.port=8501
      --server.headless=true
    ports:
      - "8501:8501"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2}
      MCP_SERVER_URL: http://mcp-server:8010/mcp
      DOCS_DIR: /docs
      CHROMA_DIR: /app/data/chroma
      UPLOADS_DIR: /app/uploads
    volumes:
      - ../docs:/docs:ro
      - ./data/chroma:/app/data/chroma
      - ./uploads:/app/uploads
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      mcp-server:
        condition: service_started
    restart: unless-stopped

volumes:
  ollama_data:
