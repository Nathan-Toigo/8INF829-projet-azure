services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dms_pgvector
    environment:
      POSTGRES_USER: dms
      POSTGRES_PASSWORD: dms
      POSTGRES_DB: dms_rag
    ports:
      - "5433:5432"
    volumes:
      - dms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dms -d dms_rag"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  dms_pgdata:
